narrative:
  position: "top-right"
  width: 0.38
  items:
    - label: false
      text: >
        Shah Jahan dreamed of recovering Samarkand — the ancestral Timurid homeland.
        Nazar Muhammad Khan, king of the vast kingdom of Bukhara was weak
        and incompetent. When rebellions broke out in various of Bukhara's provinces, Shah Jahan seized the chance.
        A first force under Murad Bakhsh captured Balkh in July 1646 but Murad
        abandoned his command, leaving a winter garrison stranded.

    - label: false
      text: >
        In January 1647, Aurangzeb — 29 years old — was given the governorship
        and marched north from Kabul with 35,000 troops. He shattered an Uzbek ambush in
        the Hindu Kush defiles at Dera-i-Gaz, entered Balkh on 25 May, then swept
        northwest to rout Subhan Quli's forces at Aqcha (1–7 June).

    - label: false
      text: >
        Yet, the position was hopeless. Some 120,000 Uzbek horsemen refused pitched battle
        and raided supply lines; the province yielded almost no revenue; senior commanders
        secretly dragged their feet. A compromise was reached and Balkh was surrendered
        on 1 October. The retreat through
        the Ghazniyak Pass was brutal — the rearguard crossed in a blizzard, the last men
        reaching Kabul on 10 November. Four crore rupees, 5,000 lives, nothing gained.

  reference: "Jadunath Sarkar, History of Aurangzib, Vol. I (1912)"
