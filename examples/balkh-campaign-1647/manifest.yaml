# Aurangzeb's Balkh Campaign, 1647
#
# Shah Jahan's son Aurangzeb governs Balkh and Badakhshan and leads a
# campaign against the Uzbek Khanate of Bukhara. Despite tactical victories
# at Dera-i-Gaz and Aqcha, the Mughals withdraw after one gruelling season,
# having spent four crore rupees and gained nothing.

